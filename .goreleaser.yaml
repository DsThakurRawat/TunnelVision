# .goreleaser.yaml
# The .goreleaser.yaml file is a configuration file used by Goreleaser to
# define how to build, package, and release Go projects.

version: 2
project_name: tunnelvision

git:
  ignore_tags:
    - "pkg/caddy/*"

builds:
  - main: ./cmd/tunnelvision
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch part of the filename.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/*.md
      - packaging/systemd/*.service
      - packaging/windows/*.ps1
      - packaging/examples/*.yaml
      - packaging/caddy/Caddyfile

nfpms:
  - id: tunnelvision
    package_name: tunnelvision
    vendor: "kad"
    homepage: "https://github.com/DsThakurRawat/TunnelVision"
    maintainer: "Alexander D. Kanevskiy <kad@kad.name>"
    description: "A Go client/server for tunnelvision"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: ./packaging/systemd/tunnelvision-client@.service
        dst: /usr/lib/systemd/system/tunnelvision-client@.service
      - src: ./packaging/systemd/tunnelvision-server@.service
        dst: /usr/lib/systemd/system/tunnelvision-server@.service

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# You can add more configuration here, e.g., for Docker images, publishing to GitHub releases, etc.
